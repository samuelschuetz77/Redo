name: MAUI Android Build (Artifact) - .NET 10
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  # Update this path to match your .csproj file
  PROJECT_PATH: YourMauiApp/YourMauiApp.csproj
jobs:
  build-android:
    name: Build Android (Release)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install MAUI workload
        run: dotnet workload install maui
      - name: Restore project
        run: dotnet restore ${{ env.PROJECT_PATH }}
      - name: Publish Android Release build
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -f net10.0-android
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "**/*.apk"
